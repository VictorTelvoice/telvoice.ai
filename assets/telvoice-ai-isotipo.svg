<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">Isotipo Telvoice AI</title>
  <desc id="desc">Aro circular luminoso azul, cyan y violeta</desc>
  <defs>
    <linearGradient id="ring" x1="12" y1="14" x2="84" y2="82" gradientUnits="userSpaceOnUse">
      <stop stop-color="#45E7FF"/>
      <stop offset=".48" stop-color="#347BFF"/>
      <stop offset="1" stop-color="#A05CFF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(48 48) rotate(90) scale(42)">
      <stop stop-color="#2D86FF" stop-opacity=".22"/>
      <stop offset="1" stop-color="#2D86FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.8"/>
    </filter>
  </defs>
  <circle cx="48" cy="48" r="42" fill="url(#glow)"/>
  <circle cx="48" cy="48" r="32" fill="none" stroke="url(#ring)" stroke-width="5.5" opacity=".35" filter="url(#blur)"/>
  <circle cx="48" cy="48" r="32" fill="none" stroke="url(#ring)" stroke-width="4.2" stroke-linecap="round"/>
  <circle cx="48" cy="48" r="23.5" fill="none" stroke="#79DFFF" stroke-opacity=".18" stroke-width="1" stroke-dasharray="2 5"/>
  <circle cx="48" cy="16" r="3.4" fill="#67E7FF"/>
  <circle cx="48" cy="16" r="7" fill="#67E7FF" opacity=".2"/>
</svg>
