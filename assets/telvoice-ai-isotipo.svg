<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">Isotipo animado Telvoice AI</title>
  <desc id="desc">Anillo circular luminoso con colores cyan, azul y violeta en movimiento</desc>
  <defs>
    <linearGradient id="ring" x1="12" y1="12" x2="84" y2="84" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#45E7FF">
        <animate attributeName="stop-color" values="#45E7FF;#347BFF;#A05CFF;#45E7FF" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset=".5" stop-color="#347BFF">
        <animate attributeName="stop-color" values="#347BFF;#A05CFF;#45E7FF;#347BFF" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#A05CFF">
        <animate attributeName="stop-color" values="#A05CFF;#45E7FF;#347BFF;#A05CFF" dur="8s" repeatCount="indefinite"/>
      </stop>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 48 48" to="360 48 48" dur="10s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="3.3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="48" cy="48" r="32" fill="none" stroke="url(#ring)" stroke-width="4.5" opacity=".42" filter="url(#glow)">
    <animate attributeName="opacity" values=".34;.58;.34" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="48" cy="48" r="32" fill="none" stroke="url(#ring)" stroke-width="4.2" stroke-linecap="round">
    <animate attributeName="stroke-width" values="4.1;4.5;4.1" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
