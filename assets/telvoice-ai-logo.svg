<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 52" role="img" aria-labelledby="title desc">
  <title id="title">Telvoice AI</title>
  <desc id="desc">Logotipo de Telvoice AI con isotipo circular luminoso</desc>
  <defs>
    <linearGradient id="ring" x1="4" y1="4" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#45E7FF"/>
      <stop offset=".5" stop-color="#347BFF"/>
      <stop offset="1" stop-color="#A05CFF"/>
    </linearGradient>
    <linearGradient id="ai" x1="174" y1="10" x2="236" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#68E8FF"/>
      <stop offset="1" stop-color="#8A62FF"/>
    </linearGradient>
  </defs>
  <circle cx="26" cy="26" r="18" fill="none" stroke="url(#ring)" stroke-width="4"/>
  <circle cx="26" cy="8" r="2.5" fill="#67E7FF"/>
  <text x="56" y="34" fill="#F7FAFF" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="750" letter-spacing="-1">Telvoice</text>
  <text x="164" y="34" fill="url(#ai)" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="800" letter-spacing="-1">AI</text>
</svg>
